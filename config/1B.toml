[model]
vocab_size            = 49152
embed_dim             = 1408
num_heads             = 8
num_layers            = 32
max_seq_len           = 4096
dropout               = 0.0
use_rope              = true
rope_base             = 1_000_000
rope_dim              = 64
use_yarn              = false
yarn_scale            = 4.0
yarn_original_max_len = 4096
use_swiglu            = true
n_kv_heads            = 2
mtp_steps             = 1
use_qk_norm           = true
soft_cap              = 0
use_flash_attn        = true
attn_head_dim         = 256

[gdn]
hybrid_ratio          = 3
gdn_head_dim          = 128
gdn_v_heads           = 16

[training]
batch_size            = 32
gradient_accumulation = 32
max_grad_norm         = 1.0
num_epochs            = 1
num_workers           = 4
use_compile           = true
compile_mode          = "default"
benchmark_steps       = 20

[optimizer]
learning_rate  = 4e-4
weight_decay   = 0.1
adam_beta1     = 0.9
adam_beta2     = 0.95
adam_eps       = 1e-8

[scheduler]
warmup_ratio   = 0.02
decay_ratio    = 0.15
min_lr_ratio   = 0.1

[data]
data_file      = "./pretrain_data.bin"
val_tokens     = 20_000_000
use_packing    = true

[checkpoint]
checkpoint_file      = "./Model/NaylisGDN_1B_pretrain.pt"
save_every_hours     = 1.0
validate_every_steps = 250
val_batches          = 50

[precision]
use_fp8 = true

[huggingface]
hf_repo          = "silyan/Naylis1-1B"
hf_push_interval = 1800

[tokenizer]
model          = "HuggingFaceTB/cosmo2-tokenizer"
special_tokens = []
